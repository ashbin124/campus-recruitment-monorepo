name: Backend CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-test-secret
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campus_test?schema=public
      DISABLE_RATE_LIMIT: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format Check
        run: npm run format:check

      - name: Test
        run: npm test
