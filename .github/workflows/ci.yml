name: Monorepo CI

on:
  push:
    branches:
      - '**'
    paths:
      - 'Campus-back/**'
      - 'Campusrec.io/**'
      - 'package.json'
      - 'scripts/**'
      - '.github/workflows/**'
      - '.github/dependabot.yml'
  pull_request:
    paths:
      - 'Campus-back/**'
      - 'Campusrec.io/**'
      - 'package.json'
      - 'scripts/**'
      - '.github/workflows/**'
      - '.github/dependabot.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Campus-back
    env:
      JWT_SECRET: ci-test-secret
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campus_test?schema=public
      DISABLE_RATE_LIMIT: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Campus-back/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format Check
        run: npm run format:check

      - name: Test
        run: npm test

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Campusrec.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Campusrec.io/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format Check
        run: npm run format:check

      - name: Build
        run: npm run build
