version: 2
updates:
  - package-ecosystem: npm
    directory: /Campus-back
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: npm
    directory: /Campusrec.io
    schedule:
      interval: weekly
      day: monday
      time: '04:15'
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:30'
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
      include: scope
